<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My web</title>
    <link rel="stylesheet" href="css/positioning.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="https://salt.tikicdn.com/ts/upload/0e/07/78/ee828743c9afa9792cf20d75995e134e.png" alt="Logo Tiki">
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="#">Trang chủ</a></li>
                    <li><a href="#">Sản phẩm</a></li>
                    <li><a href="#">Liên hệ</a></li>
                </ul>
            </nav>
        </header>


        <div class="page">
            <aside class="siderbar">
                <ul>
                    <li><a href="#">Điện thoại</a></li>
                    <li><a href="#">TV</a></li>
                    <li><a href="#">Laptop</a></li>
                </ul>
            </aside>


            <main class="main-content">
                <article class="product-card">
                    <span class="badge-hot">HOT</span>
                    <figure>
                        <img src="https://tse4.mm.bing.net/th/id/OIP.MCgJTRE0KP290O0vaf_F9QHaJM?pid=Api&h=220&P=0"
                            alt="iPhone 15 Pro Max màu titan tự nhiên — nhìn từ mặt trước"
                            width="600" height="400"
                            loading="lazy">
                        <figcaption>iPhone 15 Pro Max - 25.990.000đ</figcaption>
                    </figure>
                </article>
            </main>
    </div>

    <button class="scroll-top">↑</button>
</body>
</html>
