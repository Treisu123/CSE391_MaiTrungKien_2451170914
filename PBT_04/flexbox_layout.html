<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/flexbox.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="https://salt.tikicdn.com/ts/upload/0e/07/78/ee828743c9afa9792cf20d75995e134e.png"
                    alt="Logo tiki">
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>
            <div class="login-ground">
                <button type="button" class="btn-login">Login</button>
                <button type="button" class="btn-register">Register</button>
            </div>
        </header>

        <main class="card-container">
            <div class="card">
                <img src="https://tse1.mm.bing.net/th/id/OIP.iESOegxbfi3movbkZc5vfQHaHa?pid=Api&h=220&P=0" alt="Tai nghe Bluetooth Chụp Tai Sony WH-CH720N">
                <div class="card-info">
                    <h3>Tai nghe Sony</h3>
                    <p class="price">1.200.000₫</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://cf.shopee.vn/file/sg-11134201-22100-ipwk94un17iv7b" alt="Bàn Phím Cơ Máy Tính K2 Pro Led Cực Đẹp">
                <div class="card-info">
                    <h3>Bàn phím cơ</h3>
                    <p class="price">850.000₫</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://tse1.mm.bing.net/th/id/OIP.smsGyjxRgtVTB05skV8FhAHaHa?pid=Api&h=220&P=0" alt="Chuột không dây Logitech B175 nổi bật tiện ích, giá thành rẻ – Ben Computer">
                <div class="card-info">
                    <h3>Chuột không dây</h3>
                    <p class="price">450.000₫</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://phucanhcdn.com/media/lib/31169_ManhinhDellU2415-1.jpg" alt="Màn hình Dell U2415 24 inch UltraSharp IPS - Chính Hãng">
                <div class="card-info">
                    <h3>Màn hình 24"</h3>
                    <p class="price">3.500.000₫</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://i5.walmartimages.com/asr/4f20f0e0-2e0b-41aa-a805-277b31b43323.226be6876614452cb33004914f04ff22.jpeg" alt="1080P Webcam Full HD USB 2.0 For PC Desktop & Laptop Web Camera with ...">
                <div class="card-info">
                    <h3>Webcam HD</h3>
                    <p class="price">600.000₫</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://cdn.tgdd.vn/Products/Images/2162/325303/loa-bluetooth-rezo-play-thumb-600x600.jpg" alt="Loa Bluetooth Rezo Play - giá tốt, chính hãng">
                <div class="card-info">
                    <h3>Loa Bluetooth</h3>
                    <p class="price">980.000₫</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://tse1.mm.bing.net/th/id/OIP.XbGO87REXbxV154mJBCaRAHaHa?pid=Api&h=220&P=0" alt="Jual USB Hub 7 Port USB 3.0 High Speed Extender Kecepatan Tinggi ...">
                <div class="card-info">
                    <h3>USB Hub 7 cổng</h3>
                    <p class="price">320.000₫</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://down-vn.img.susercontent.com/file/e878f63c5a9f0730ee3cb6516dd6708f" alt="Đế tản nhiệt Laptop N99 Cooling Pad 2 quạt, đèn Led, có nấc nâng lên hạ ...">
                <div class="card-info">
                    <h3>Đế tản nhiệt</h3>
                    <p class="price">270.000₫</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>

</html>
